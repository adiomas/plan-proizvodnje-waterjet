<!DOCTYPE html>
<html lang="hr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Nema veze — Plan Proizvodnje</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #fff;
      color: #111827;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: env(safe-area-inset-top, 0) 24px env(safe-area-inset-bottom, 0);
    }
    .container {
      text-align: center;
      max-width: 320px;
    }
    .icon {
      width: 56px;
      height: 56px;
      margin: 0 auto 24px;
      background: #f3f4f6;
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .icon svg {
      width: 28px;
      height: 28px;
      color: #9ca3af;
    }
    h1 {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 8px;
    }
    p {
      font-size: 14px;
      color: #6b7280;
      line-height: 1.5;
      margin-bottom: 24px;
    }
    .retry-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: #111827;
      color: #fff;
      border: none;
      padding: 10px 20px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .retry-btn:active { opacity: 0.8; }
    .retry-btn.loading { opacity: 0.5; pointer-events: none; }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    .spinner {
      width: 14px;
      height: 14px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      display: none;
    }
    .retry-btn.loading .spinner { display: block; }
    .retry-btn.loading .label { display: none; }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">
      <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="1" y1="1" x2="23" y2="23"/>
        <path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55"/>
        <path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39"/>
        <path d="M10.71 5.05A16 16 0 0 1 22.56 9"/>
        <path d="M1.42 9a15.91 15.91 0 0 1 4.7-2.88"/>
        <path d="M8.53 16.11a6 6 0 0 1 6.95 0"/>
        <line x1="12" y1="20" x2="12.01" y2="20"/>
      </svg>
    </div>
    <h1>Nema internetske veze</h1>
    <p>Provjerite Wi-Fi ili mobilne podatke i pokušajte ponovo.</p>
    <button class="retry-btn" id="retryBtn" onclick="retry()">
      <span class="label">Pokušaj ponovo</span>
      <div class="spinner"></div>
    </button>
  </div>

  <script>
    function retry() {
      var btn = document.getElementById("retryBtn");
      btn.classList.add("loading");
      // Pokušaj navigaciju na dashboard
      window.location.href = "/dashboard";
      // Fallback — ukloni loading nakon 3s ako se ništa ne dogodi
      setTimeout(function() { btn.classList.remove("loading"); }, 3000);
    }

    // Auto-retry kad se veza vrati
    window.addEventListener("online", function() {
      window.location.href = "/dashboard";
    });
  </script>
</body>
</html>
